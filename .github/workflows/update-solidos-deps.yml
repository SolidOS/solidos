name: Update SolidOS Dev Dependencies

on:
  workflow_call:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Install solidos dependencies (dev if newer, else latest)
        shell: bash
        run: |
          pkgs=$(node -p "(require('./package.json').solidosDependencies || []).join(' ')")
          if [ -z "$pkgs" ]; then
            echo "No solidosDependencies found, skipping"
            exit 0
          fi
          for pkg in $pkgs; do
            latest=$(npm view "$pkg" version)
            dev=$(npm view "$pkg@dev" version 2>/dev/null) || true
            if [ -n "$dev" ] && [ "$(printf '%s\n' "$latest" "$dev" | sort -V | tail -1)" = "$dev" ]; then
              echo "Installing $pkg@dev (newer than latest $latest)"
              npm install "$pkg@dev" --save-exact
            else
              echo "Installing $pkg@$latest"
              npm install "$pkg@$latest" --save-exact
            fi
          done
      - name: Commit dependency updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add package.json package-lock.json
            git commit -m "chore: update solidos dependencies to latest compatible versions"
            git push
          fi
